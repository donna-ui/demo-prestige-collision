<script>
(function(){
  'use strict';
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var touch   = matchMedia('(hover: none), (pointer: coarse)').matches;
  var narrow  = window.innerWidth < 960;

  /* ---------- CUSTOM CURSOR (desktop + wide only) ---------- */
  if (!touch && !narrow) {
    var dot = document.getElementById('cursor-dot');
    var trail = document.getElementById('cursor-trail');
    if (dot && trail) {
      var tx=0, ty=0, cx=0, cy=0, ticking=false;
      window.addEventListener('mousemove', function(e){
        tx = e.clientX; ty = e.clientY;
        dot.style.transform = 'translate3d('+tx+'px,'+ty+'px,0) translate(-50%,-50%)';
        if (!ticking) { requestAnimationFrame(updateTrail); ticking = true; }
      }, { passive: true });
      function updateTrail(){
        cx += (tx-cx)*0.2;
        cy += (ty-cy)*0.2;
        trail.style.transform = 'translate3d('+cx+'px,'+cy+'px,0) translate(-50%,-50%)';
        if (Math.abs(tx-cx) > 0.5 || Math.abs(ty-cy) > 0.5) requestAnimationFrame(updateTrail);
        else ticking = false;
      }
      document.querySelectorAll('a,button,.chip,.tag').forEach(function(el){
        el.addEventListener('mouseenter', function(){ document.body.classList.add('cursor-big'); });
        el.addEventListener('mouseleave', function(){ document.body.classList.remove('cursor-big'); });
      });
    }
  }

  /* ---------- HERO SCROLL (opacity-only, rAF-throttled) ---------- */
  var hero    = document.getElementById('hero');
  var finalL  = document.getElementById('heroFinal');
  var sweep   = document.getElementById('heroSweep');
  var stage   = document.getElementById('heroStage');
  var stageN  = document.getElementById('heroStageNum');
  var sig     = document.getElementById('heroSig');
  var stages  = ['COLLISION','STRIP','STRAIGHTEN','PRIME','COLOR','DELIVERED'];
  var lastIdx = -1;
  var rafPending = false;
  var cachedTotal = 0;

  function measureHero(){ if (hero) cachedTotal = hero.offsetHeight - window.innerHeight; }
  measureHero();
  window.addEventListener('resize', measureHero, { passive: true });

  function applyHero(){
    rafPending = false;
    if (!hero || !finalL) return;
    var rect = hero.getBoundingClientRect();
    if (cachedTotal <= 0) return;
    var p = Math.min(Math.max(-rect.top / cachedTotal, 0), 1);

    // Only update if user can see hero (rect.bottom > 0)
    if (rect.bottom < -window.innerHeight) return;

    finalL.style.opacity = p.toFixed(3);

    if (sweep) {
      var sp = Math.min(Math.max((p - 0.45) / 0.35, 0), 1);
      sweep.style.transform = 'translate3d('+((sp-1)*110)+'%,0,0)';
      sweep.style.opacity = (sp > 0 && sp < 1) ? '1' : '0';
    }

    var idx = Math.min(stages.length - 1, Math.floor(p * stages.length * .9999));
    if (idx !== lastIdx) {
      lastIdx = idx;
      if (stage)  stage.textContent  = stages[idx];
      if (stageN) stageN.textContent = String(idx+1).padStart(2,'0') + ' / 0' + stages.length;
    }
    if (sig) sig.style.opacity = p > 0.82 ? '1' : '0';
  }

  function onScroll(){
    if (!rafPending) { rafPending = true; requestAnimationFrame(applyHero); }
  }
  if (!reduced) {
    window.addEventListener('scroll', onScroll, { passive: true });
    applyHero();
  } else if (finalL) {
    finalL.style.opacity = 1;
  }

  /* ---------- REVEAL ---------- */
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting) {
        en.target.classList.add('in');
        if (en.target.classList.contains('reveal-voice')) en.target.classList.add('revealed');
        io.unobserve(en.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -80px 0px' });
  document.querySelectorAll('.reveal, .reveal-voice').forEach(function(el){ io.observe(el); });

  /* ---------- MAGNETIC NAV CTA ---------- */
  if (!touch && !narrow) {
    var cta = document.querySelector('.nav__cta');
    if (cta) {
      var ctaRaf = false, mx=0, my=0;
      cta.addEventListener('mousemove', function(e){
        var r = cta.getBoundingClientRect();
        mx = e.clientX - (r.left + r.width/2);
        my = e.clientY - (r.top + r.height/2);
        if (!ctaRaf) { ctaRaf = true; requestAnimationFrame(function(){
          cta.style.transform = 'translate3d('+(mx*0.2)+'px,'+(my*0.25)+'px,0)';
          ctaRaf = false;
        });}
      });
      cta.addEventListener('mouseleave', function(){ cta.style.transform = ''; });
    }
  }

  /* ---------- SMOOTH ANCHOR ---------- */
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click', function(e){
      var id = a.getAttribute('href');
      if (id.length > 1) {
        var t = document.querySelector(id);
        if (t) { e.preventDefault(); t.scrollIntoView({ behavior: 'smooth' }); }
      }
    });
  });
})();
</script>
