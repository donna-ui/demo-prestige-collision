<script>
(function(){
  'use strict';
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var touch   = matchMedia('(hover: none), (pointer: coarse)').matches;
  var narrow  = window.innerWidth < 960;

  /* ---------- CUSTOM CURSOR (desktop + wide only) ---------- */
  if (!touch && !narrow) {
    var dot = document.getElementById('cursor-dot');
    var trail = document.getElementById('cursor-trail');
    if (dot && trail) {
      var tx=0, ty=0, cx=0, cy=0, ticking=false;
      window.addEventListener('mousemove', function(e){
        tx = e.clientX; ty = e.clientY;
        dot.style.transform = 'translate3d('+tx+'px,'+ty+'px,0) translate(-50%,-50%)';
        if (!ticking) { requestAnimationFrame(updateTrail); ticking = true; }
      }, { passive: true });
      function updateTrail(){
        cx += (tx-cx)*0.2;
        cy += (ty-cy)*0.2;
        trail.style.transform = 'translate3d('+cx+'px,'+cy+'px,0) translate(-50%,-50%)';
        if (Math.abs(tx-cx) > 0.5 || Math.abs(ty-cy) > 0.5) requestAnimationFrame(updateTrail);
        else ticking = false;
      }
      document.querySelectorAll('a,button,.chip,.tag').forEach(function(el){
        el.addEventListener('mouseenter', function(){ document.body.classList.add('cursor-big'); });
        el.addEventListener('mouseleave', function(){ document.body.classList.remove('cursor-big'); });
      });
    }
  }

  /* ---------- OPENING SEQUENCE ---------- */
  var opener = document.getElementById('opener');
  var car    = document.getElementById('openerCar');
  var word   = document.getElementById('openerWord');
  var numEl  = document.getElementById('openerNum');
  var fillEl = document.getElementById('openerFill');
  var stages = ['COLLISION','STRIP','STRAIGHTEN','PRIME','COLOR','DELIVERED'];
  var lastIdx = -1, rafPending = false, openTotal = 0;

  function measureOpener(){ if (opener) openTotal = opener.offsetHeight - window.innerHeight; }
  measureOpener();
  window.addEventListener('resize', measureOpener, { passive: true });

  function applyOpener(){
    rafPending = false;
    if (!opener) return;
    var rect = opener.getBoundingClientRect();
    if (openTotal <= 0) return;
    var p = Math.min(Math.max(-rect.top / openTotal, 0), 1);

    if (rect.bottom < -40) return;

    // progress bar
    if (fillEl) fillEl.style.width = (p * 100).toFixed(2) + '%';

    // car filter evolves with progress (dark broken → bright gleaming)
    if (car) {
      var g  = (1 - p).toFixed(2);
      var br = (0.22 + p * 0.85).toFixed(2);
      var sa = (0.3  + p * 0.9).toFixed(2);
      var op = (0.7  + p * 0.3).toFixed(2);
      car.style.filter  = 'grayscale('+g+') brightness('+br+') contrast(1.15) saturate('+sa+')';
      car.style.opacity = op;
    }

    var idx = Math.min(stages.length - 1, Math.floor(p * stages.length * .9999));
    if (idx !== lastIdx) {
      lastIdx = idx;
      if (numEl) numEl.textContent = String(idx+1).padStart(2,'0');
      if (word) {
        word.classList.remove('swap-in');
        word.classList.add('swap-out');
        setTimeout(function(){
          word.innerHTML = stages[idx] + '<span class="dot">.</span>';
          word.classList.remove('swap-out');
          void word.offsetWidth;
          word.classList.add('swap-in');
        }, 160);
      }
    }

    // Cinematic exit: fade everything out during last ~12% of opener scroll
    var sticky = opener.querySelector('.opener__sticky');
    if (sticky) {
      var exiting = p > 0.88;
      if (sticky.classList.contains('is-exit') !== exiting) sticky.classList.toggle('is-exit', exiting);
    }
  }

  function onScroll(){
    if (!rafPending) { rafPending = true; requestAnimationFrame(applyOpener); }
  }
  if (!reduced) {
    window.addEventListener('scroll', onScroll, { passive: true });
    applyOpener();
  }

  /* ---------- HERO ENTRANCE + PARALLAX ---------- */
  var heroEl = document.getElementById('hero');
  var heroPhoto = document.getElementById('heroPhoto');
  if (heroEl) {
    var hio = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if (en.isIntersecting) { heroEl.classList.add('is-in'); hio.unobserve(heroEl); }
      });
    }, { threshold: 0.25 });
    hio.observe(heroEl);
  }
  if (heroPhoto && !reduced) {
    var hpRaf = false;
    window.addEventListener('scroll', function(){
      if (hpRaf) return;
      hpRaf = true;
      requestAnimationFrame(function(){
        var r = heroEl.getBoundingClientRect();
        var y = Math.max(-100, Math.min(100, -r.top * 0.08));
        heroPhoto.style.transform = 'translate3d(0,'+y.toFixed(1)+'px,0) scale(1.06)';
        hpRaf = false;
      });
    }, { passive: true });
  }

  /* ---------- REVEAL ---------- */
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting) {
        en.target.classList.add('in');
        if (en.target.classList.contains('reveal-voice')) en.target.classList.add('revealed');
        io.unobserve(en.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -80px 0px' });
  document.querySelectorAll('.reveal, .reveal-voice').forEach(function(el){ io.observe(el); });

  /* ---------- MAGNETIC NAV CTA ---------- */
  if (!touch && !narrow) {
    var cta = document.querySelector('.nav__cta');
    if (cta) {
      var ctaRaf = false, mx=0, my=0;
      cta.addEventListener('mousemove', function(e){
        var r = cta.getBoundingClientRect();
        mx = e.clientX - (r.left + r.width/2);
        my = e.clientY - (r.top + r.height/2);
        if (!ctaRaf) { ctaRaf = true; requestAnimationFrame(function(){
          cta.style.transform = 'translate3d('+(mx*0.2)+'px,'+(my*0.25)+'px,0)';
          ctaRaf = false;
        });}
      });
      cta.addEventListener('mouseleave', function(){ cta.style.transform = ''; });
    }
  }

  /* ---------- SMOOTH ANCHOR ---------- */
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click', function(e){
      var id = a.getAttribute('href');
      if (id.length > 1) {
        var t = document.querySelector(id);
        if (t) { e.preventDefault(); t.scrollIntoView({ behavior: 'smooth' }); }
      }
    });
  });
})();
</script>
