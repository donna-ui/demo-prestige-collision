<script>
(function(){
  'use strict';
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var touch  = matchMedia('(hover: none), (pointer: coarse)').matches;

  /* ---------- CUSTOM CURSOR ---------- */
  if (!touch) {
    var dot = document.getElementById('cursor-dot');
    var trail = document.getElementById('cursor-trail');
    if (dot && trail) {
      var tx=0, ty=0, dx=0, dy=0, cx=0, cy=0;
      window.addEventListener('mousemove', function(e){ tx=e.clientX; ty=e.clientY; dx=e.clientX; dy=e.clientY; });
      function anim(){
        cx += (tx-cx)*0.18;
        cy += (ty-cy)*0.18;
        dot.style.transform   = 'translate('+dx+'px,'+dy+'px) translate(-50%,-50%)';
        trail.style.transform = 'translate('+cx+'px,'+cy+'px) translate(-50%,-50%)';
        requestAnimationFrame(anim);
      }
      anim();
      document.querySelectorAll('a,button,.chip,.tag').forEach(function(el){
        el.addEventListener('mouseenter', function(){ document.body.classList.add('cursor-big'); });
        el.addEventListener('mouseleave', function(){ document.body.classList.remove('cursor-big'); });
      });
    }
  }

  /* ---------- HERO RESURRECTION SCROLL ---------- */
  var hero   = document.getElementById('hero');
  var car    = document.getElementById('heroCar');
  var sweep  = document.getElementById('heroSweep');
  var stage  = document.getElementById('heroStage');
  var sig    = document.getElementById('heroSig');
  var stages = ['COLLISION','STRIP','STRAIGHTEN','PRIME','COLOR','DELIVERED'];
  var lastStage = -1;

  function onHeroScroll(){
    if (!hero || !car) return;
    var rect = hero.getBoundingClientRect();
    var total = hero.offsetHeight - window.innerHeight;
    if (total <= 0) return;
    var p = Math.min(Math.max(-rect.top / total, 0), 1); // 0 → 1

    // Filter progression
    var g = (1 - p);                            // grayscale
    var br = 0.25 + p * 0.85;                   // brightness
    var bl = (1 - p) * 3;                       // blur
    var sat = 0.4 + p * 0.8;                    // saturate
    var scale = 1.05 - p * 0.08;                // zoom out slightly
    car.style.filter = 'grayscale('+g.toFixed(2)+') brightness('+br.toFixed(2)+') blur('+bl.toFixed(2)+'px) saturate('+sat.toFixed(2)+')';
    car.style.transform = 'translate(-50%,-50%) scale('+scale.toFixed(3)+')';

    // Paint sweep appears between 0.45 and 0.8
    if (sweep) {
      var sp = Math.min(Math.max((p - 0.45) / 0.35, 0), 1);
      sweep.style.transform = 'translateX('+((sp-1)*100)+'%)';
      sweep.style.opacity = sp < 1 ? '1' : '0';
    }

    // Stage label
    var idx = Math.min(stages.length - 1, Math.floor(p * stages.length));
    if (idx !== lastStage) {
      lastStage = idx;
      if (stage) stage.textContent = stages[idx];
    }

    // Signature appears near the end
    if (sig) sig.style.opacity = p > 0.82 ? '1' : '0';
  }
  if (!reduced) {
    window.addEventListener('scroll', onHeroScroll, { passive: true });
    onHeroScroll();
  }

  /* ---------- REVEAL ON SCROLL ---------- */
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if (en.isIntersecting) {
        en.target.classList.add('in');
        if (en.target.classList.contains('reveal-voice')) {
          en.target.classList.add('revealed');
        }
        io.unobserve(en.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -80px 0px' });
  document.querySelectorAll('.reveal, .reveal-voice').forEach(function(el){ io.observe(el); });

  /* ---------- MAGNETIC NAV CTA ---------- */
  if (!touch) {
    var cta = document.querySelector('.nav__cta');
    if (cta) {
      cta.addEventListener('mousemove', function(e){
        var r = cta.getBoundingClientRect();
        var mx = e.clientX - (r.left + r.width/2);
        var my = e.clientY - (r.top + r.height/2);
        cta.style.transform = 'translate('+(mx*0.2)+'px,'+(my*0.25)+'px)';
      });
      cta.addEventListener('mouseleave', function(){ cta.style.transform = ''; });
    }
  }

  /* ---------- TAG PEGBOARD: STRING LINES (subtle) ---------- */
  // handled via CSS only

  /* ---------- SMOOTH ANCHOR ---------- */
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click', function(e){
      var id = a.getAttribute('href');
      if (id.length > 1) {
        var t = document.querySelector(id);
        if (t) { e.preventDefault(); t.scrollIntoView({ behavior: 'smooth' }); }
      }
    });
  });
})();
</script>
