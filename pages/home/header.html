/* ===== NAV ===== */

/* ===== HERO — RESURRECTION SCROLL ===== */
.hero {
  position: relative;
  height: 400vh; /* scroll-scrub range */
}
.hero__sticky {
  position: sticky; top: 0;
  height: 100vh;
  overflow: hidden;
  background: var(--navy);
}
.hero__bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(255,90,31,.18) 0%, transparent 60%),
    linear-gradient(180deg, var(--navy) 0%, #050d17 100%);
}
/* Scanning light bars */
.hero__scan {
  position: absolute; inset: -5%;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(245,239,230,.015) 3px, rgba(245,239,230,.015) 4px);
  pointer-events: none;
  mix-blend-mode: overlay;
}

.hero__car {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(1.05);
  width: min(1400px, 95vw);
  aspect-ratio: 16/9;
  background:
    url("https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=2000&q=75&auto=format&fit=crop") center/cover no-repeat,
    var(--asphalt);
  filter: grayscale(1) brightness(.25) blur(3px) saturate(.4);
  transition: filter .1s linear, transform .1s linear;
  will-change: filter, transform;
}
.hero__car::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 60%, transparent 30%, rgba(0,0,0,.7) 80%);
  pointer-events: none;
}

/* Paint sweep — orange wipe that grows with scroll */
.hero__paint-sweep {
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 100%;
  background: linear-gradient(135deg, rgba(255,90,31,0) 40%, rgba(255,90,31,.35) 50%, rgba(255,90,31,0) 60%);
  mix-blend-mode: screen;
  transform: translateX(-100%);
  pointer-events: none;
  will-change: transform;
}

.hero__stage {
  position: absolute;
  left: 6vw; bottom: 8vh;
  font-family: var(--f-stencil);
  font-size: clamp(14px, 1.4vw, 18px);
  color: var(--orange);
  letter-spacing: .4em;
  line-height: 1;
}
.hero__stage::before {
  content: ""; display: inline-block;
  width: 40px; height: 2px;
  background: var(--orange);
  vertical-align: middle;
  margin-right: 14px;
}
.hero__stage-label {
  display: inline-block;
  transition: opacity .3s, transform .3s;
}

.hero__title {
  position: absolute;
  left: 6vw; right: 6vw;
  top: 18vh;
  font-family: var(--f-display);
  font-size: clamp(48px, 11vw, 180px);
  line-height: .88;
  color: var(--cream);
  pointer-events: none;
  letter-spacing: -.01em;
}
.hero__title em {
  font-style: normal;
  color: var(--orange);
  display: block;
}

.hero__sub {
  position: absolute;
  left: 6vw;
  top: calc(18vh + clamp(120px, 24vw, 360px));
  max-width: 560px;
  font-family: var(--f-serif);
  font-style: italic;
  font-size: clamp(17px, 1.6vw, 22px);
  color: var(--cream);
  opacity: .88;
  line-height: 1.45;
  border-left: 3px solid var(--orange);

}

.hero__signature {
  position: absolute;
  right: 5vw; bottom: 12vh;
  font-family: var(--f-hand);
  font-size: clamp(22px, 2.6vw, 36px);
  color: var(--cream);
  opacity: 0;
  transform: rotate(-5deg);
  transition: opacity .6s var(--ease);
}
.hero__signature span { color: var(--orange); }

.hero__scroll-hint {
  position: absolute;
  left: 50%; bottom: 3vh;

@media (max-width: 700px) {

/* ===== SECTION 3: WORK ORDER CLIPBOARD ===== */
.workorder {
  position: relative;
  padding: 140px 4vw 160px;
  background: var(--navy);
  overflow: hidden;
}
.workorder::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,90,31,.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(245,197,24,.04) 0%, transparent 50%);
  pointer-events: none;
}
.workorder__inner {
  position: relative;
  max-width: 820px;
  margin: 0 auto;
}
.workorder__paper {
  position: relative;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 36px, rgba(0,42,82,.08) 36px, rgba(0,42,82,.08) 37px),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  padding: 56px 60px 70px;
  transform: rotate(-1.4deg);
  box-shadow: var(--shadow-deep);
  color: var(--ink);
}
.workorder__paper::before {
  /* red margin line */
  content: "";
  position: absolute; top: 0; bottom: 0;
  left: 52px;
  width: 1px;
  background: rgba(201,74,58,.55);
}
.workorder__paper::after {
  /* coffee ring */
  content: "";
  position: absolute;
  right: 44px; bottom: 38px;
  width: 70px; height: 70px;
  border-radius: 50%;
  border: 3px solid rgba(120,80,30,.18);
  box-shadow: inset 0 0 0 2px rgba(120,80,30,.08);
  pointer-events: none;
  transform: rotate(12deg);
}
.workorder__clip {
  position: absolute;
  top: -28px; left: 50%;
  transform: translateX(-50%) rotate(3deg);
  width: 90px; height: 140px;
  z-index: 2;
}
.workorder__head {
  font-family: var(--f-stencil);
  letter-spacing: .3em;
  font-size: 13px;
  color: var(--red-line);
  margin-bottom: 6px;
}
.workorder__title {
  font-family: var(--f-stencil);
  font-size: clamp(28px, 4vw, 44px);
  letter-spacing: .12em;
  color: var(--ink);
  margin-bottom: 28px;
  line-height: 1;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
}
.workorder__list {
  list-style: none;
  display: grid;
  gap: 16px;
  font-family: var(--f-sans);
  font-size: 18px;
}
.workorder__list li {
  display: flex;
  gap: 18px;
  align-items: baseline;
}
.workorder__list .check {
  font-family: var(--f-hand);
  color: var(--red-line);
  font-size: 30px;
  line-height: .8;
  flex-shrink: 0;
  width: 28px;
  transform: rotate(-8deg);
}
.workorder__list strong {
  font-family: var(--f-stencil);
  letter-spacing: .1em;
  font-size: 14px;
  color: var(--ink);
  margin-right: 8px;
}
.workorder__stamp {
  position: absolute;
  right: -10px; top: 40px;
  font-family: var(--f-stencil);
  font-size: 13px;
  letter-spacing: .2em;
  color: var(--red-line);
  border: 3px double var(--red-line);
  padding: 10px 18px;
  transform: rotate(8deg);
  opacity: .75;
  line-height: 1.1;
  text-align: center;
}

/* ===== SECTION 4: PEGBOARD OF SERVICES ===== */
.services {
  position: relative;
  padding: 140px 4vw 160px;
  background:
    radial-gradient(circle at 16px 16px, rgba(0,0,0,.35) 3px, transparent 4px),
    linear-gradient(180deg, #9c6b3e 0%, #7e5731 100%);
  background-size: 48px 48px, 100% 100%;
}
.services::before {
  content: "";
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='w'><feTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3'/><feColorMatrix values='0 0 0 0 .15 0 0 0 0 .08 0 0 0 0 .03 0 0 0 .5 0'/></filter><rect width='300' height='300' filter='url(%23w)'/></svg>");
  opacity: .6;
  mix-blend-mode: multiply;
  pointer-events: none;
}
.services__inner {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
}
.services__label {
  font-family: var(--f-stencil);
  letter-spacing: .4em;
  color: var(--cream);
  font-size: 12px;
  margin-bottom: 12px;
  opacity: .9;
}
.services__title {
  font-family: var(--f-display);
  font-size: clamp(36px, 6vw, 72px);
  color: var(--cream);
  line-height: 1;
  margin-bottom: 72px;
  max-width: 12ch;
}
.services__title span { color: var(--orange); }

.pegboard {
  position: relative;
  min-height: 560px;
}
.tag {
  position: absolute;
  display: block;
  background: #EAD9B4;
  color: var(--ink);
  padding: 18px 28px 20px 44px;
  clip-path: polygon(0 28%, 14% 0, 100% 0, 100% 100%, 0 100%);
  font-family: var(--f-stencil);
  letter-spacing: .18em;
  font-size: clamp(13px, 1.3vw, 17px);
  text-decoration: none;
  box-shadow: 0 10px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(0,0,0,.08);
  transition: transform .35s var(--ease), box-shadow .35s var(--ease);
  transform-origin: top left;
  min-width: 200px;
}
.tag::before {
  /* hole for string */
  content: "";
  position: absolute;
  top: 12px; left: 18px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--ink);
  box-shadow: 0 0 0 2px rgba(0,0,0,.4);
}
.tag__desc {
  display: block;
  font-family: var(--f-serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0;
  font-size: 13px;
  margin-top: 4px;
  color: rgba(21,23,28,.7);
}
.tag:hover {
  transform: rotate(0deg) translateY(-6px) !important;
  box-shadow: 0 22px 50px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.12);
}

.tag.t1 { top: 2%;   left: 4%;   transform: rotate(-7deg); background: #EAD9B4; }
.tag.t2 { top: 4%;   left: 34%;  transform: rotate(4deg);  background: var(--orange); color: var(--navy); }
.tag.t2 .tag__desc { color: rgba(11,27,43,.75); }
.tag.t3 { top: 18%;  left: 62%;  transform: rotate(-3deg); background: #E5D0A0; }
.tag.t4 { top: 36%;  left: 12%;  transform: rotate(6deg);  background: #DFC690; }
.tag.t5 { top: 54%;  left: 44%;  transform: rotate(-9deg); background: var(--yellow); color: var(--ink); }
.tag.t5 .tag__desc { color: rgba(21,23,28,.75); }
.tag.t6 { top: 70%;  left: 68%;  transform: rotate(5deg);  background: #EAD9B4; }
.tag.t7 { top: 76%;  left: 8%;   transform: rotate(-4deg); background: var(--cream); }
.tag.t8 { top: 30%;  left: 38%;  transform: rotate(8deg);  background: #C4A572; color: var(--cream); }
.tag.t8 .tag__desc { color: rgba(245,239,230,.8); }

@media (max-width: 780px) {
  .pegboard { min-height: auto; display: flex; flex-direction: column; gap: 18px; padding: 10px 0; }
  .tag { position: relative; top: auto !important; left: auto !important; min-width: 0; width: 88%; }
  .tag.t2, .tag.t4, .tag.t6, .tag.t8 { align-self: flex-end; }
  .tag.t1 { transform: rotate(-2deg); }
  .tag.t2 { transform: rotate(2deg); }
  .tag.t3 { transform: rotate(-1deg); }
  .tag.t4 { transform: rotate(2deg); }
  .tag.t5 { transform: rotate(-2deg); }
  .tag.t6 { transform: rotate(1deg); }
  .tag.t7 { transform: rotate(-1deg); }
  .tag.t8 { transform: rotate(2deg); }
}

/* ===== SECTION 5: THE WALL (PAINT CHIPS) ===== */
.wall {
  position: relative;
  padding: 140px 0 160px;
  background: linear-gradient(180deg, var(--navy) 0%, #050d17 100%);
}
.wall__head {
  max-width: 1200px; margin: 0 auto 60px; padding: 0 4vw;
}
.wall__label { font-family: var(--f-stencil); letter-spacing: .4em; color: var(--orange); font-size: 12px; margin-bottom: 14px; }
.wall__title {
  font-family: var(--f-display);
  font-size: clamp(40px, 7vw, 96px);
  line-height: .95;
  color: var(--cream);
  max-width: 14ch;
}
.wall__title em { font-style: normal; color: var(--orange); display: inline; }
.wall__sub {
  margin-top: 22px;
  max-width: 560px;
  font-family: var(--f-serif);
  font-style: italic;
  font-size: 18px;
  color: rgba(245,239,230,.72);
}
.chip-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 2px;
  padding: 0 2vw;
  max-width: 1600px;
  margin: 0 auto;
}
.chip {
  aspect-ratio: 3/4;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform .4s var(--ease);
  text-decoration: none;
  color: inherit;
  display: block;
}
.chip__swatch {
  position: absolute; inset: 0;
  transition: transform .7s var(--ease), filter .5s;
}
.chip__swatch::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.1) 0%, transparent 40%, rgba(0,0,0,.25) 100%);
}
.chip__meta {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 18px 20px 20px;
  font-family: var(--f-stencil);
  letter-spacing: .16em;
  font-size: 12px;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,.55));
  z-index: 2;
}
.chip__meta small {
  display: block;
  font-family: var(--f-serif);
  font-style: italic;
  letter-spacing: 0;
  font-size: 12px;
  opacity: .75;
  margin-top: 4px;
  text-transform: none;
}
.chip__hex {
  position: absolute;
  top: 18px; right: 20px;
  font-family: var(--f-sans);
  font-size: 10px;
  letter-spacing: .1em;
  background: rgba(0,0,0,.4);
  padding: 4px 8px;
  color: var(--cream);
  backdrop-filter: blur(4px);
  z-index: 2;
}
.chip:hover .chip__swatch { transform: scale(1.05); filter: saturate(1.2) brightness(1.05); }
.chip:hover { z-index: 3; }

/* chip colors — real paint colors pulled from classic cars */
.c1 .chip__swatch { background: linear-gradient(135deg, #FF5A1F 0%, #C5391A 100%); }
.c2 .chip__swatch { background: linear-gradient(135deg, #1F2E4D 0%, #0A1630 100%); }
.c3 .chip__swatch { background: linear-gradient(135deg, #8B0000 0%, #5A0000 100%); }
.c4 .chip__swatch { background: linear-gradient(135deg, #F5EFE6 0%, #D4CAB5 100%); color: var(--ink); }
.c4 .chip__meta { color: var(--ink); background: linear-gradient(180deg, transparent, rgba(0,0,0,.1)); }
.c4 .chip__hex { background: rgba(255,255,255,.5); color: var(--ink); }
.c5 .chip__swatch { background: linear-gradient(135deg, #1C1C1C 0%, #000 100%); }
.c6 .chip__swatch { background: linear-gradient(135deg, #F5C518 0%, #C79600 100%); color: var(--ink); }
.c6 .chip__meta { color: var(--ink); }
.c7 .chip__swatch { background: linear-gradient(135deg, #2A4D3A 0%, #0E2419 100%); }
