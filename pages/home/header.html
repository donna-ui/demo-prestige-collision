/* ===== WORK ORDER ===== */
.workorder {
  position: relative;
  padding: 140px 4vw 160px;
  background: var(--navy);
  overflow: hidden;
}
.workorder::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,90,31,.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(245,197,24,.04) 0%, transparent 50%);
  pointer-events: none;
}
.workorder__inner {
  position: relative;
  max-width: 820px;
  margin: 0 auto;
}
.workorder__paper {
  position: relative;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 36px, rgba(0,42,82,.08) 36px, rgba(0,42,82,.08) 37px),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  padding: 56px 60px 70px;
  transform: rotate(-1.2deg);
  box-shadow: var(--shadow-deep);
  color: var(--ink);
}
.workorder__paper::before {
  content: "";
  position: absolute; top: 0; bottom: 0;
  left: 52px;
  width: 1px;
  background: rgba(184,53,42,.55);
}
.workorder__clip {
  position: absolute;
  top: -28px; left: 50%;
  transform: translateX(-50%) rotate(3deg);
  width: 90px; height: 140px;
  z-index: 2;
}
.workorder__head {
  font-family: var(--f-stencil);
  letter-spacing: .3em;
  font-size: 12px;
  color: var(--red-ink);
  margin-bottom: 6px;
}
.workorder__title {
  font-family: var(--f-stencil);
  font-size: clamp(26px, 4vw, 42px);
  letter-spacing: .12em;
  color: var(--ink);
  margin-bottom: 28px;
  line-height: 1;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
}
.workorder__list {
  list-style: none;
  display: grid;
  gap: 18px;
  font-family: var(--f-sans);
  font-size: 17px;
}
.workorder__list li {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
.workorder__check {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border: 2px solid var(--ink);
  background: var(--paper);
  position: relative;
}
.workorder__check::after {
  content: "";
  position: absolute;
  left: 3px; top: -2px;
  width: 10px; height: 16px;
  border-right: 3px solid var(--red-ink);
  border-bottom: 3px solid var(--red-ink);
  transform: rotate(40deg);
}
.workorder__list strong {
  font-family: var(--f-stencil);
  letter-spacing: .1em;
  font-size: 14px;
  color: var(--ink);
  margin-right: 10px;
}
.workorder__stamp {
  position: absolute;
  right: -10px; top: 40px;
  font-family: var(--f-stencil);
  font-size: 13px;
  letter-spacing: .2em;
  color: var(--red-ink);
  border: 3px double var(--red-ink);
  padding: 10px 18px;
  transform: rotate(8deg);
  opacity: .8;
  line-height: 1.1;
  text-align: center;
}

/* ===== SERVICES PEGBOARD ===== */
.services {
  position: relative;
  padding: 140px 4vw 160px;
  background:
    radial-gradient(circle at 16px 16px, rgba(0,0,0,.38) 3px, transparent 4px),

}
.services::before {
  content: "";
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='w'><feTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3'/></filter><rect width='300' height='300' filter='url(%23w)' opacity='.4'/></svg>");

.services__inner { position: relative; max-width: 1200px; margin: 0 auto; }

.services__title span { color: var(--orange); }
.pegboard { position: relative; min-height: 560px; }
.tag {
  position: absolute;
  display: block;
  background: #EAD9B4;
  color: var(--ink);
  padding: 18px 28px 20px 44px;
  clip-path: polygon(0 28%, 14% 0, 100% 0, 100% 100%, 0 100%);

  letter-spacing: .18em;
  font-size: clamp(13px, 1.3vw, 17px);
  text-decoration: none;
  box-shadow: 0 10px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(0,0,0,.08);
  transition: transform .35s var(--ease);
  transform-origin: top left;
  min-width: 200px;
  will-change: transform;
}
.tag::before {
  content: "";
  position: absolute;
  top: 12px; left: 18px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--ink);
}
.tag__desc {
  display: block;
  font-family: var(--f-serif);
  font-style: italic;

  letter-spacing: 0;
  font-size: 13px;
  margin-top: 4px;
  color: rgba(21,23,28,.7);

.tag:hover { transform: rotate(0deg) translateY(-6px) !important; }
.tag.t1 { top: 2%;   left: 4%;   transform: rotate(-7deg); background: #EAD9B4; }
.tag.t2 { top: 4%;   left: 34%;  transform: rotate(4deg);  background: var(--orange); color: var(--navy); }

.tag.t5 { top: 54%;  left: 44%;  transform: rotate(-9deg); background: var(--yellow); color: var(--ink); }
.tag.t5 .tag__desc { color: rgba(21,23,28,.75); }
.tag.t6 { top: 70%;  left: 68%;  transform: rotate(5deg);  background: #EAD9B4; }
.tag.t7 { top: 76%;  left: 8%;   transform: rotate(-4deg); background: var(--cream); }
.tag.t8 { top: 30%;  left: 38%;  transform: rotate(8deg);  background: #C4A572; color: var(--cream); }
.tag.t8 .tag__desc { color: rgba(245,239,230,.8); }
@media (max-width: 780px) {
  .pegboard { min-height: auto; display: flex; flex-direction: column; gap: 18px; padding: 10px 0; }

  .tag.t2, .tag.t4, .tag.t6, .tag.t8 { align-self: flex-end; }
  .tag.t1 { transform: rotate(-2deg); }
  .tag.t2 { transform: rotate(2deg); }
  .tag.t3 { transform: rotate(-1deg); }
  .tag.t4 { transform: rotate(2deg); }
  .tag.t5 { transform: rotate(-2deg); }
  .tag.t6 { transform: rotate(1deg); }
  .tag.t7 { transform: rotate(-1deg); }
  .tag.t8 { transform: rotate(2deg); }
